name: Build VE Windows

on:
  push:
    branches: [main, ve/feature/windows-production-hardening]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore VE.Windows/VE.Windows.csproj

      - name: Publish self-contained app
        run: dotnet publish VE.Windows/VE.Windows.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VE-Windows-Installer
          path: ./publish/
          retention-days: 30
